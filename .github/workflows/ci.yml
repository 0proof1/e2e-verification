name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  unit:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.11"
          - os: ubuntu-latest
            python: "3.12"
          - os: ubuntu-latest
            python: "3.13"
          - os: macos-latest
            python: "3.12"
          - os: windows-latest
            python: "3.12"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python tools/install_checkout.py --extras dev --require-clean
      - run: python -m unittest discover -s tests -v
      - run: python -m compileall -q src tests tools
      - run: python tools/release_check.py
      - run: e2e-verify doctor

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip build
      - run: python -m build
      - run: python tools/check_artifact.py dist/*
      - run: python tools/generate_sbom.py dist/sbom.cdx.json
      - run: sha256sum dist/*.whl dist/*.tar.gz > /tmp/e2e-verification-SHA256SUMS
      - run: sha256sum -c /tmp/e2e-verification-SHA256SUMS
      - run: python -m venv /tmp/e2e-verification-smoke
      - run: /tmp/e2e-verification-smoke/bin/pip install --force-reinstall dist/*.whl
      - run: /tmp/e2e-verification-smoke/bin/e2e-verify doctor
      - run: /tmp/e2e-verification-smoke/bin/e2e-verify assets
      - run: /tmp/e2e-verification-smoke/bin/e2e-verify validate --config examples/project.example.json
      - run: /tmp/e2e-verification-smoke/bin/e2e-verify model-plan --model-plan examples/model-plan.example.json --provider custom

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip pip-audit
      - run: python tools/install_checkout.py --extras dev,xlsx --require-clean
      - run: pip-audit --local

  api-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python tools/install_checkout.py --extras dev --require-clean
      - run: python -m unittest tests.test_api_integration -v
        env:
          E2E_RUN_NETWORK_TESTS: "1"

  browser-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python tools/install_checkout.py --extras dev --require-clean
      - run: python -m playwright install --with-deps chromium
      - run: python -m unittest tests.test_browser_integration -v
        env:
          E2E_RUN_BROWSER_TESTS: "1"
          E2E_RUN_NETWORK_TESTS: "1"

  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: docker compose build --build-arg SOURCE_SHA="$GITHUB_SHA"
      - run: docker compose run --rm verifier
