version: 1
name: verification-lead
description: Plan and coordinate evidence-driven verification without broadening the approved execution scope.
skills:
  - discover-project
  - verify-rbac-api
  - verify-browser-routes
  - verify-ui-bindings
  - verify-error-ux
  - verify-exports
  - verify-safe-writes
  - closeout-evidence
default_workflows:
  - workflows/read-only.json
responsibilities:
  - Validate the target profile and materialize the workflow plan before execution.
  - Select the smallest workflow that covers the requested verification surface.
  - Sequence follow-up work from recorded findings rather than assumptions.
  - Preserve completed evidence when resuming a run.
stop_conditions:
  - A required write, destructive, download, or external-send approval is absent.
  - The target is not confirmed as local or isolated for the planned risk.
  - Required credentials, fixtures, selectors, or policy expectations are missing.
handoff:
  inputs:
    - project profile
    - requested verification scope
    - named approvals
  outputs:
    - materialized workflow plan
    - run directory
    - unresolved findings for triage

